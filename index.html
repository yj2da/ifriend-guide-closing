<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Friend 26th | Closing Ceremony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8f9fb;
            color: #2c3e50;
            min-height: 100vh;
        }

        .serif-title { font-family: 'Cormorant Garamond', serif; }
        
        .ceremony-card { 
            background: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
            position: relative;
            z-index: 1;
        }

        .gold-accent { color: #c5a059; }
        .navy-accent { color: #1a2a6c; }
        
        .lang-btn { 
            color: #94a3b8; 
            font-size: 0.8rem; 
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            border-radius: 99px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .lang-btn.active { 
            background-color: #1a2a6c;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(26, 42, 108, 0.2);
        }

        .rule-item {
            position: relative;
            padding-left: 1.75rem;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #4b5563;
            counter-increment: step-counter;
        }
        .rule-item::before {
            content: counter(step-counter);
            position: absolute;
            left: 0; top: 0.2em;
            width: 1.2rem; height: 1.2rem;
            background: #f1f5f9;
            color: #1a2a6c;
            font-size: 0.7rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .character-float {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            font-size: 1.5rem;
        }

        .bubble {
            position: relative;
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .bubble::after {
            content: '';
            position: absolute;
            top: -8px; left: 20px;
            border-width: 0 8px 8px 8px;
            border-style: solid;
            border-color: transparent transparent #f1f5f9 transparent;
        }

        .tag {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            background: #f8fafc;
            color: #94a3b8;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-weight: 700;
            border: 1px solid #f1f5f9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-screen-sm mx-auto px-6 py-16">
        <header class="text-center mb-16 animate-fade">
            <div class="character-float mb-2 text-2xl">✨</div>
            <span class="text-[10px] font-bold tracking-[0.4em] text-slate-400 uppercase mb-3 block">I-Friend 26th</span>
            <h1 class="text-5xl serif-title navy-accent mb-4 italic uppercase">Closing Ceremony</h1>
            <div class="h-px w-12 bg-amber-200 mx-auto mb-6"></div>
            <p class="text-slate-400 text-[11px] tracking-[0.2em] font-semibold uppercase">Program Guide</p>
        </header>

        <nav class="flex justify-center items-center space-x-1 mb-12 animate-fade" style="animation-delay: 0.1s;">
            <button onclick="changeLanguage('kr')" id="btn-kr" class="lang-btn active">한국어</button>
            <button onclick="changeLanguage('en')" id="btn-en" class="lang-btn">English</button>
            <button onclick="changeLanguage('ja')" id="btn-ja" class="lang-btn">日本語</button>
            <button onclick="changeLanguage('zh')" id="btn-zh" class="lang-btn">中文</button>
        </nav>

        <main id="content" class="space-y-12">
            <section class="ceremony-card p-8 md:p-10 animate-fade" style="animation-delay: 0.2s;">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span class="tag mb-3 inline-block">SESSION 01</span>
                        <div class="flex items-center space-x-3">
                            <h2 class="text-3xl font-bold navy-accent" id="game1-title">라이어 게임</h2>
                            <span class="character-float">🦁</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-slate-300 tracking-widest font-bold mb-1 uppercase">Time</p>
                        <p class="text-sm font-semibold text-slate-500">19:05 — 19:35</p>
                    </div>
                </div>
                <div class="space-y-8">
                    <div>
                        <h3 class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase mb-5" id="how-to-label">Guide</h3>
                        <ul class="space-y-5" id="game1-rules"></ul>
                    </div>
                    <div class="bg-amber-50/50 p-6 rounded-2xl flex items-center space-x-4 border border-amber-100/50">
                        <div class="text-amber-600 text-xl"><i class="fas fa-gift"></i></div>
                        <div>
                            <p class="text-[9px] font-bold text-amber-600/60 uppercase tracking-widest mb-1" id="prize-label">Reward</p>
                            <p class="text-sm text-slate-700 font-bold" id="game1-prize"></p>
                        </div>
                    </div>
                    <div class="bubble"><span id="game1-tip"></span></div>
                </div>
            </section>

            <section class="ceremony-card p-8 md:p-10 animate-fade" style="animation-delay: 0.3s;">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span class="tag mb-3 inline-block">SESSION 02</span>
                        <div class="flex items-center space-x-3">
                            <h2 class="text-3xl font-bold navy-accent" id="game2-title">뮤직 스탑 빙고</h2>
                            <span class="character-float" style="animation-delay: 0.5s;">🐼</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-slate-300 tracking-widest font-bold mb-1 uppercase">Time</p>
                        <p class="text-sm font-semibold text-slate-500">19:35 — 19:50</p>
                    </div>
                </div>
                <div class="space-y-8">
                    <div>
                        <h3 class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase mb-5" id="how-to-label2">Guide</h3>
                        <ul class="space-y-5" id="game2-rules"></ul>
                    </div>
                    <div class="bg-indigo-50/50 p-6 rounded-2xl flex items-center space-x-4 border border-indigo-100/50">
                        <div class="text-indigo-600 text-xl"><i class="fas fa-star"></i></div>
                        <div>
                            <p class="text-[9px] font-bold text-indigo-600/60 uppercase tracking-widest mb-1" id="prize-label2">Point!</p>
                            <p class="text-sm text-slate-700 font-bold" id="game2-prize"></p>
                        </div>
                    </div>
                    <div class="bubble"><span id="game2-tip"></span></div>
                </div>
            </section>
        </main>

        <footer class="text-center mt-24 pb-12 animate-fade" style="animation-delay: 0.4s;">
            <div class="flex justify-center space-x-2 mb-4 opacity-30 text-xs">
                <span>🎈</span><span>🎊</span><span>🎈</span>
            </div>
            <p class="text-[10px] text-slate-300 tracking-widest uppercase font-bold">© 2026 I-Friend 26th Closing Ceremony</p>
        </footer>
    </div>

    <script>
        const translations = {
            kr: {
                game1Title: "라이어 게임",
                game1Rules: [
                    "각 조에서 무대에 나올 대표자 한 명을 뽑아주세요.",
                    "대표자들은 제시어를 받지만, 한 명의 '라이어'는 다른 제시어를 받습니다.",
                    "한 명씩 돌아가며 제시어에 대한 설명을 한 문장으로 말합니다. (단, 제시어를 직접 말하면 안 됨)",
                    "모든 설명이 끝난 후, 조별끼리 3분간 의논하여 라이어일 것 같은 조 번호를 배부된 보드판에 써주세요.",
                    "투표 후 라이어의 정체가 공개됩니다."
                ],
                game1Prize: "라이어를 맞춘 조 전원에게 럭키드로우 기회 +1!",
                game1Tip: "💡 조원들과 상의해서 진짜 라이어를 찾아 투표하세요!",
                game2Title: "뮤직 스탑 빙고",
                game2Rules: [
                    "빙고 용지와 볼펜을 받습니다.",
                    "음악에 따라 자유롭게 이동합니다.",
                    "이동하면서 두 명씩 짝을 짓습니다.",
                    "자기소개와 함께 빙고지의 질문에 대해 답변을 주고받습니다.",
                    "대화를 나눈 후, 상대방의 답변과 사인을 받습니다.",
                    "빙고를 채우면, 새로운 짝을 찾아 이동합니다.",
                    "세 줄 빙고 완성 시, 앞으로 나와 상품을 받아가세요."
                ],
                game2Prize: "세 줄 빙고 완성 시 상품 증정! (소진 시 조기 마감)",
                game2Tip: "💡 빙고를 완성한 후에도, 자유롭게 움직이며 새로운 친구를 만나봐요!",
                ui: { howTo: "Guide", prize: "Reward", point: "Point!" }
            },
            en: {
                game1Title: "Liar Game",
                game1Rules: [
                    "Select one representative from each group to come up on stage.",
                    "Everyone receives a keyword, but the 'Liar' receives a different word.",
                    "Each person explains the word in one sentence. (Don't say the word itself!)",
                    "After everyone speaks, groups have 3 mins to discuss and write the Liar's group number on the board.",
                    "The Liar's identity will be revealed after voting."
                ],
                game1Prize: "+1 Lucky Draw chance for everyone who catches the Liar!",
                game1Tip: "💡 Discuss with your team to find the real Liar!",
                game2Title: "Music Stop Bingo",
                game2Rules: [
                    "Receive a bingo sheet and a pen.",
                    "Move freely to the music.",
                    "Find a partner while moving around.",
                    "Introduce yourself and exchange answers to the questions.",
                    "After the chat, get your partner's answer and signature.",
                    "Once a square is filled, find a new partner and keep moving.",
                    "Complete 3 lines of Bingo and come forward for a prize!"
                ],
                game2Prize: "Prizes for 3-line Bingo! (Until supplies last)",
                game2Tip: "💡 Even after completing Bingo, keep moving and meet new friends!",
                ui: { howTo: "Guide", prize: "Reward", point: "Tip!" }
            },
            ja: {
                game1Title: "ライアーゲーム",
                game1Rules: [
                    "各グループからステージに上がる代表者を1名選んでください。",
                    "代表者にはお題が与えられますが、一人の「ライアー」には別のお題が与えられます。",
                    "一人ずつ順番にお題を直接言わずに一文で説明します。",
                    "全員の説明が終わった後、各グループで3分間話し合ってライアーを特定します。",
                    "投票後、ライアーの正体が公開されます。"
                ],
                game1Prize: "ライアーを当てたグループ全員にラッキードローのチャンス+1！",
                game1Tip: "💡 チームメイトと相談して、本物のライアーを見つけて投票しましょう！",
                game2Title: "ミュージック・ストップ・ビンゴ",
                game2Rules: [
                    "ビンゴ用紙とボールペンを受け取ります。",
                    "音楽に合わせて自由に移動します。",
                    "移動しながら二人一組のペアを作ります。",
                    "自己紹介とともにビンゴの質問に答えます。",
                    "会話が終わったら、相手の回答とサインをもらいます。",
                    "マスを埋めたら、新しいパートナーを探して移動します。",
                    "3列ビンゴが完成したら、前に出て賞品を受け取ってください。"
                ],
                game2Prize: "3列ビンゴ完成で賞品ゲット！（無くなり次第終了）",
                game2Tip: "💡 ビンゴを完成させた後も、自由に動いて新しい友達を作ってみましょう！",
                ui: { howTo: "進行方法", prize: "報酬", point: "ポイント！" }
            },
            zh: {
                game1Title: "说谎者游戏",
                game1Rules: [
                    "请各组选出一名代表上台。",
                    "代表们会收到一个关键词，但其中一位“说谎者”将获得不同的词。",
                    "轮流用一句话描述该词。（注意：严禁直接说出词名）",
                    "描述结束后，各组讨论3分钟，并将认为可能是说谎者的组号写在发放的小白板上。",
                    "投票结束后，揭晓说谎者的真实身份。"
                ],
                game1Prize: "成功识破说谎者的团队成员将获得 1 次抽奖机会！",
                game1Tip: "💡 与组员讨论，找出真正的说谎者并投票吧！",
                game2Title: "音乐停止宾果",
                game2Rules: [
                    "领取专属宾果卡与签字笔。",
                    "随音乐节奏自由移动。",
                    "在移动过程中寻找伙伴结成对子。",
                    "在自我介绍的同时，针对宾果卡上的问题进行问答。",
                    "交流结束后，获取对方的回答和签名。",
                    "填满格位后，请寻找新的伙伴并继续移动。",
                    "完成三行宾果后，请到台前领取奖品。"
                ],
                game2Prize: "完成三行宾果即可领奖！（奖品送完即止）",
                game2Tip: "💡 即使在完成宾果后，也请随心所欲地移动，去结识新的朋友吧！",
                ui: { howTo: "游戏规则", prize: "奖励", point: "小贴士！" }
            }
        };

        function changeLanguage(lang) {
            const data = translations[lang];
            document.getElementById('game1-title').innerText = data.game1Title;
            document.getElementById('game2-title').innerText = data.game2Title;
            document.getElementById('how-to-label').innerText = data.ui.howTo;
            document.getElementById('how-to-label2').innerText = data.ui.howTo;
            document.getElementById('prize-label').innerText = data.ui.prize;
            document.getElementById('prize-label2').innerText = data.ui.point;
            document.getElementById('game1-prize').innerText = data.game1Prize;
            document.getElementById('game2-prize').innerText = data.game2Prize;
            document.getElementById('game1-tip').innerText = data.game1Tip;
            document.getElementById('game2-tip').innerText = data.game2Tip;
            updateList('game1-rules', data.game1Rules);
            updateList('game2-rules', data.game2Rules);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
        }

        function updateList(id, rules) {
            const list = document.getElementById(id);
            list.innerHTML = '';
            list.style.counterReset = 'step-counter';
            rules.forEach(rule => {
                const li = document.createElement('li');
                li.className = 'rule-item';
                li.innerText = rule;
                list.appendChild(li);
            });
        }

        changeLanguage('kr');
    </script>
</body>
</html>
